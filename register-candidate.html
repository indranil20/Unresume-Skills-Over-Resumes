<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" type="image/png" href="images/favicon.png">
<title>Register as Candidate — Unresume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="css/globals.css">
<link rel="stylesheet" href="css/navbar.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px}
.auth-orb1{position:fixed;width:500px;height:500px;background:radial-gradient(circle,rgba(91,108,245,.12) 0%,transparent 70%);top:-100px;left:-150px;border-radius:50%;pointer-events:none}
.auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:24px;padding:36px 40px;width:100%;max-width:480px;position:relative;z-index:1}
@media(max-width:520px){.auth-card{padding:28px 22px}}
.step-bar{display:flex;gap:6px;margin-bottom:24px}
.step-dot{height:4px;border-radius:2px;flex:1;background:var(--border-light);transition:background .3s}
.step-dot.active{background:linear-gradient(90deg,#5b6cf5,#8040d8)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:420px){.grid2{grid-template-columns:1fr}}
.skill-chip{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text3)}
.skill-chip:hover{border-color:var(--border-light)}
.skill-chip.on{background:rgba(91,108,245,.15);border-color:rgba(91,108,245,.45);color:var(--brand)}
.submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,#5b6cf5,#8040d8);border:none;border-radius:12px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s;margin-top:4px}
.submit-btn:hover{opacity:.9}
.back-link{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:var(--text3);text-decoration:none;margin-bottom:14px;transition:color .15s}
.back-link:hover{color:var(--text1)}
textarea.input-area{width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:11px;padding:11px 14px;color:var(--text1);font-size:14px;font-family:var(--font-body);resize:vertical;min-height:80px;outline:none;transition:border-color .15s}
textarea.input-area:focus{border-color:rgba(91,108,245,.45)}
textarea.input-area::placeholder{color:var(--text4)}
</style>
</head>
<body>
<div class="auth-orb1"></div>
<div class="auth-card">
  <a href="index.html" class="auth-logo" style="display:inline-flex;margin-bottom:14px">
    <div><img src="images/unresume-logo.png" alt="Unresume" style="height:70px;display:block;width:auto"></div>
  </a>
  <a href="register.html" class="back-link"><span class="material-symbols-rounded" style="font-size:16px">arrow_back</span> Back</a>
  <div class="step-bar"><div class="step-dot active" id="s1"></div><div class="step-dot" id="s2"></div></div>

  <h1 style="font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--text1);letter-spacing:-.025em;margin-bottom:6px" id="formTitle">Create your account</h1>
  <p style="font-size:14px;color:var(--text3);margin-bottom:24px" id="formSub">Start building your skill portfolio today.</p>

  <form id="step1Form" style="display:flex;flex-direction:column;gap:18px">
    <div class="grid2">
      <div class="form-field"><label class="form-label">First Name</label><div class="input-wrap"><input type="text" placeholder="Alex"></div></div>
      <div class="form-field"><label class="form-label">Last Name</label><div class="input-wrap"><input type="text" placeholder="Johnson"></div></div>
    </div>
    <div class="form-field"><label class="form-label">Email</label><div class="input-wrap"><span class="material-symbols-rounded">mail</span><input type="email" placeholder="you@example.com"></div></div>
    <div class="form-field"><label class="form-label">Password</label><div class="input-wrap"><span class="material-symbols-rounded">lock</span><input type="password" placeholder="Min 8 characters"></div></div>
    <div class="form-field"><label class="form-label">Short Bio</label><textarea class="input-area" placeholder="Briefly describe yourself and your goals…"></textarea></div>
    <button type="submit" class="submit-btn">Continue <span class="material-symbols-rounded" style="font-size:18px">arrow_forward</span></button>
  </form>

  <form id="step2Form" style="display:none;flex-direction:column;gap:18px">
    <div class="form-field">
      <label class="form-label">Select your skills</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px" id="skillsWrap"></div>
      <p style="font-size:12px;color:var(--text4);margin-top:8px" id="skillCount">0 selected — you can update this later</p>
    </div>
    <button type="submit" class="submit-btn">Create Account <span class="material-symbols-rounded" style="font-size:18px">check</span></button>
  </form>

  <p style="margin-top:20px;text-align:center;font-size:13.5px;color:var(--text3)">Already have an account? <a href="login.html" style="color:var(--brand);font-weight:700;text-decoration:none">Sign In →</a></p>
</div>

<script src="js/components.js"></script>
<script>
const skills = ['React','Python','Node.js','UI/UX Design','Figma','TypeScript','Data Science','Machine Learning','Flutter','AWS','PostgreSQL','DevOps'];
const selected = new Set();

function renderSkills() {
  document.getElementById('skillsWrap').innerHTML = skills.map(s =>
    `<button type="button" class="skill-chip ${selected.has(s)?'on':''}" onclick="toggleSkill('${s}',this)">${s}</button>`
  ).join('');
}
function toggleSkill(s, btn) {
  selected.has(s) ? selected.delete(s) : selected.add(s);
  btn.classList.toggle('on', selected.has(s));
  document.getElementById('skillCount').textContent = `${selected.size} selected — you can update this later`;
}

document.getElementById('step1Form').addEventListener('submit', e => {
  e.preventDefault();
  document.getElementById('step1Form').style.display = 'none';
  document.getElementById('step2Form').style.display = 'flex';
  document.getElementById('s2').classList.add('active');
  document.getElementById('formTitle').textContent = 'Your skills';
  document.getElementById('formSub').textContent = 'Select skills you want to work on or get hired for.';
  renderSkills();
});

document.getElementById('step2Form').addEventListener('submit', e => {
  e.preventDefault();
  location.href = 'candidate-dashboard.html';
});
</script>
</body>
</html>
