<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" type="image/png" href="images/favicon.png">
<title>Jobs — Unresume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="css/globals.css">
<link rel="stylesheet" href="css/navbar.css">
<style>
.aj-layout{display:grid;grid-template-columns:380px 1fr;gap:20px;align-items:start}
@media(max-width:900px){.aj-layout{grid-template-columns:1fr}}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.aj-list{display:flex;flex-direction:column;gap:10px;max-height:calc(100vh - 200px);overflow-y:auto}
.aj-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:border-color .15s}
.aj-card:hover{border-color:rgba(91,108,245,.3)}
.aj-card.active{border-color:rgba(128,64,216,.5);background:rgba(128,64,216,.05)}
.aj-card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.aj-logo{width:36px;height:36px;border-radius:9px;background:var(--bg-elevated);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.aj-company{font-size:11.5px;color:var(--text4);font-weight:600}
.aj-title{font-size:14px;font-weight:700;color:var(--text1);line-height:1.3}
.aj-skills{display:flex;flex-wrap:wrap;gap:5px}
.aj-detail{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:28px;position:sticky;top:0}
.aj-empty{text-align:center;padding:80px 24px;color:var(--text4)}
.req-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin:14px 0}
.req-item{display:flex;align-items:flex-start;gap:8px;font-size:13.5px;color:var(--text2);line-height:1.5}
.skills-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.refer-card{background:var(--bg-elevated);border:1px solid var(--border-light);border-radius:14px;padding:18px 20px;margin-top:20px}
</style>
</head>
<body>
<div class="dash-root">
  <div id="sidebar" data-role="academy"></div>
  <div class="dash-content">
    <header class="dash-topbar">
      <div class="topbar-search">
        <span class="material-symbols-rounded" style="font-size:18px;color:var(--text4)">search</span>
        <input type="text" id="searchInput" placeholder="Search by role, company, or skill…" oninput="render()">
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="topbar-popover">
          <button class="topbar-icon-btn" onclick="toggleTopbarPopover(this)"><span class="material-symbols-rounded" style="font-size:20px">notifications</span><span class="notif-dot"></span></button>
          <div class="popover-panel notif-panel">
            <div class="popover-head">Notifications <span class="mark-read" onclick="this.closest('.topbar-popover').querySelector('.notif-dot')?.remove()">Mark all read</span></div>
            <div class="notif-list">
              <div class="notif-item">
                <div class="notif-icon" style="background:rgba(0,196,255,.12);color:var(--cyan)"><span class="material-symbols-rounded" style="font-size:17px">work</span></div>
                <div><div class="notif-text">TechCorp has 2 open referral slots</div><div class="notif-time">2h ago</div></div>
              </div>
              <div class="notif-item">
                <div class="notif-icon" style="background:rgba(91,108,245,.12);color:var(--brand)"><span class="material-symbols-rounded" style="font-size:17px">handshake</span></div>
                <div><div class="notif-text">Neha Patel was placed at DataSoft</div><div class="notif-time">1d ago</div></div>
              </div>
            </div>
          </div>
        </div>
        <div class="topbar-popover">
          <div class="topbar-avatar" style="background:linear-gradient(135deg,#8040d8,#5b6cf5)" onclick="toggleTopbarPopover(this)">AC</div>
          <div class="popover-panel avatar-panel">
            <a href="#" class="avatar-menu-item" onclick="alert('Settings coming soon');return false"><span class="material-symbols-rounded" style="font-size:18px">settings</span> Account Settings</a>
            <a href="login.html" class="avatar-menu-item danger"><span class="material-symbols-rounded" style="font-size:18px">logout</span> Sign Out</a>
          </div>
        </div>
      </div>
    </header>
    <main class="dash-main">
      <div style="margin-bottom:20px">
        <h1 style="font-family:var(--font-display);font-size:clamp(18px,3vw,24px);font-weight:800;color:var(--text1);letter-spacing:-.02em;margin-bottom:4px">Job <span class="grad-text">Opportunities</span></h1>
        <p style="font-size:13px;color:var(--text3)">Browse open roles and refer your students directly — without leaving the academy dashboard.</p>
      </div>

      <div class="pills" id="catPills"></div>

      <div class="aj-layout">
        <div class="aj-list" id="jobsList"></div>
        <div id="jobDetail"></div>
      </div>
    </main>
  </div>
</div>

<script src="js/components.js"></script>
<script src="js/data.js"></script>
<script>
const jobs = getJobs();
const students = getCandidates();
let search = '', category = 'All', selectedId = jobs[0].id;

function renderPills() {
  const cats = ['All', ...new Set(jobs.map(j => j.category))];
  document.getElementById('catPills').innerHTML = cats.map(c =>
    `<button class="cat-pill ${c===category?'active':''}" onclick="setCategory('${c}')">${c}</button>`
  ).join('');
}
function setCategory(c) { category = c; render(); }

function selectJob(id) { selectedId = id; render(); }

function renderDetail() {
  const job = jobs.find(j => j.id === selectedId);
  if (!job) {
    document.getElementById('jobDetail').innerHTML = `<div class="aj-detail"><div class="aj-empty">Select a job to see details</div></div>`;
    return;
  }
  document.getElementById('jobDetail').innerHTML = `
    <div class="aj-detail">
      <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:16px">
        <div class="aj-logo" style="width:48px;height:48px;font-size:22px">${job.logo}</div>
        <div>
          <div class="aj-company">${job.company}</div>
          <div style="font-family:var(--font-display);font-size:19px;font-weight:800;color:var(--text1)">${job.title}</div>
          <span class="cat-pill" style="margin-top:6px;display:inline-block">${job.category}</span>
        </div>
      </div>
      <p style="font-size:13.5px;color:var(--text2);line-height:1.7">${job.description}</p>
      <ul class="req-list">${job.requirements.map(r=>`<li class="req-item"><span class="material-symbols-rounded" style="font-size:16px;color:var(--purple);flex-shrink:0">check_circle</span>${r}</li>`).join('')}</ul>
      <div class="skills-wrap">${job.skills.map(s=>`<span class="skill-tag">${s}</span>`).join('')}</div>

      <div class="refer-card">
        <div style="font-size:13.5px;font-weight:800;color:var(--text1);margin-bottom:8px">Refer a Student</div>
        <p style="font-size:12.5px;color:var(--text3);line-height:1.6;margin-bottom:12px">Put one of your students forward for this role at ${job.company}.</p>
        <select id="referSelect" style="width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text1);font-size:13.5px;font-family:var(--font-body);margin-bottom:10px">
          ${students.map(s => `<option value="${s.username}">${s.name}</option>`).join('')}
        </select>
        <button id="referBtn" class="btn-primary" style="font-size:13.5px;padding:10px 18px;width:100%" onclick="handleRefer()">Refer Student</button>
      </div>
    </div>`;
}

function handleRefer() {
  const select = document.getElementById('referSelect');
  const btn = document.getElementById('referBtn');
  const name = select.options[select.selectedIndex].textContent;
  btn.textContent = `✓ ${name} Referred`;
  btn.style.opacity = '.7';
  btn.disabled = true;
  select.disabled = true;
}

function render() {
  search = document.getElementById('searchInput').value;
  renderPills();
  const q = search.toLowerCase();
  const filtered = jobs.filter(j => {
    const ms = !q || j.title.toLowerCase().includes(q) || j.company.toLowerCase().includes(q) || j.skills.some(s=>s.toLowerCase().includes(q));
    const mc = category==='All' || j.category===category;
    return ms && mc;
  });

  if (!filtered.find(j => j.id === selectedId) && filtered.length) selectedId = filtered[0].id;

  document.getElementById('jobsList').innerHTML = filtered.length ? filtered.map(j => `
    <div class="aj-card ${j.id===selectedId?'active':''}" onclick="selectJob(${j.id})">
      <div class="aj-card-top">
        <div class="aj-logo">${j.logo}</div>
        <div><div class="aj-company">${j.company}</div><div class="aj-title">${j.title}</div></div>
      </div>
      <div class="aj-skills">${j.skills.slice(0,3).map(s=>`<span class="skill-tag">${s}</span>`).join('')}</div>
    </div>`).join('') : `<div class="aj-empty">No listings match your search.</div>`;

  renderDetail();
}

render();
</script>
</body>
</html>
