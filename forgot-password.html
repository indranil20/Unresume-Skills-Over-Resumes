<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" type="image/png" href="images/favicon.png">
<title>Reset Password — Unresume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="css/globals.css">
<link rel="stylesheet" href="css/navbar.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px}
.auth-orb1{position:fixed;width:500px;height:500px;background:radial-gradient(circle,rgba(91,108,245,.12) 0%,transparent 70%);top:-100px;left:-150px;border-radius:50%;pointer-events:none}
.auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:24px;padding:36px 40px;width:100%;max-width:420px;position:relative;z-index:1}
.submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,#5b6cf5,#8040d8);border:none;border-radius:12px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;transition:opacity .2s;margin-top:4px}
.submit-btn:hover{opacity:.9}
</style>
</head>
<body>
<div class="auth-orb1"></div>
<div class="auth-card">
  <a href="index.html" class="auth-logo" style="display:inline-flex;margin-bottom:14px">
    <div><img src="images/unresume-logo.png" alt="Unresume" style="height:70px;display:block;width:auto"></div>
  </a>
  <a href="login.html" style="display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:var(--text3);text-decoration:none;margin-bottom:20px"><span class="material-symbols-rounded" style="font-size:16px">arrow_back</span> Back to Sign In</a>

  <div id="formView">
    <h1 style="font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--text1);margin-bottom:6px">Reset password</h1>
    <p style="font-size:14px;color:var(--text3);margin-bottom:24px">Enter your email and we'll send you a reset link.</p>
    <form style="display:flex;flex-direction:column;gap:18px" onsubmit="handleSubmit(event)">
      <div class="form-field">
        <label class="form-label">Email Address</label>
        <div class="input-wrap"><span class="material-symbols-rounded">mail</span><input type="email" id="emailInput" placeholder="you@example.com" required></div>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Send Reset Link</button>
    </form>
  </div>

  <div id="sentView" style="display:none;text-align:center;padding:16px 0">
    <div style="width:56px;height:56px;border-radius:16px;background:rgba(0,196,255,.12);border:1px solid rgba(0,196,255,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
      <span class="material-symbols-rounded" style="font-size:28px;color:var(--cyan)">mail_check</span>
    </div>
    <h2 style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--text1);margin-bottom:8px">Check your email</h2>
    <p style="font-size:13.5px;color:var(--text3);line-height:1.7;margin-bottom:20px">We've sent a reset link to <strong id="sentEmail" style="color:var(--text1)"></strong></p>
    <button onclick="document.getElementById('formView').style.display='';document.getElementById('sentView').style.display='none'" style="font-size:13px;color:var(--brand);background:none;border:none;cursor:pointer;font-weight:600">Try a different email</button>
  </div>
</div>

<script src="js/components.js"></script>
<script>
function handleSubmit(e) {
  e.preventDefault();
  const email = document.getElementById('emailInput').value;
  const btn = document.getElementById('submitBtn');
  btn.innerHTML = '<span class="spinner" style="margin:auto"></span>';
  btn.disabled = true;
  setTimeout(() => {
    document.getElementById('sentEmail').textContent = email;
    document.getElementById('formView').style.display = 'none';
    document.getElementById('sentView').style.display = '';
  }, 1000);
}
</script>
</body>
</html>
