<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <title>Portfolio Gallery — Unresume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet">
  <link rel="stylesheet" href="css/globals.css">
  <link rel="stylesheet" href="css/navbar.css">
  <style>
    .pg-hero {
      padding: 56px 0 44px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(160deg, rgba(128, 64, 216, .06), rgba(0, 196, 255, .06))
    }

    .pg-hero h1 {
      font-family: var(--font-display);
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--text1);
      letter-spacing: -.03em;
      margin-bottom: 10px
    }

    .pg-wrap {
      max-width: 1140px;
      margin: 0 auto;
      padding: 40px 24px 80px
    }

    .pg-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 32px
    }

    .pg-count {
      margin-left: auto;
      font-size: 13px;
      color: var(--text4);
      font-weight: 600
    }

    .pg-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px
    }

    .pg-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      transition: border-color .2s, transform .2s;
      text-decoration: none;
      display: flex;
      flex-direction: column
    }

    .pg-card:hover {
      border-color: rgba(128, 64, 216, .35);
      transform: translateY(-3px)
    }

    .pg-preview {
      height: 180px;
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--border)
    }

    .pg-preview-img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .pg-preview-site {
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
      transform: scale(0.65);
      transform-origin: top left;
      width: 154%;
      height: 154%
    }

    .pg-preview-code {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--cyan);
      padding: 16px;
      text-align: left;
      line-height: 1.6;
      overflow: hidden;
      height: 100%
    }

    .pg-type-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 11px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 6px;
      backdrop-filter: blur(8px)
    }

    .pg-score {
      position: absolute;
      top: 10px;
      left: 10px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(0, 0, 0, .55);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, .08);
      color: var(--text1)
    }

    .pg-body {
      padding: 16px 18px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .pg-task-title {
      font-size: 14.5px;
      font-weight: 800;
      color: var(--text1);
      font-family: var(--font-display);
      line-height: 1.3
    }

    .pg-author {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px
    }

    .pg-av {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0
    }

    .pg-author-name {
      font-size: 12.5px;
      font-weight: 700;
      color: var(--text2)
    }

    .pg-author-uname {
      font-size: 11.5px;
      color: var(--text4)
    }

    .pg-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      margin-top: auto
    }

    .pg-footer a {
      font-size: 12.5px;
      font-weight: 700;
      color: var(--brand);
      text-decoration: none
    }

    .pg-footer a:hover {
      text-decoration: underline
    }
  </style>
</head>

<body>
  <div id="navbar"></div>

  <div class="pg-hero">
    <h1><span class="grad-text">Portfolio</span> Gallery</h1>
    <p style="font-size:14.5px;color:var(--text3)">Real work from real candidates. Browse verified task outputs.</p>
  </div>

  <div class="pg-wrap">
    <div class="pg-toolbar">
      <div id="filterPills" style="display:flex;gap:8px;flex-wrap:wrap;flex:1"></div>
      <span class="pg-count" id="countLbl"></span>
    </div>
    <div class="pg-grid" id="pgGrid"></div>
  </div>

  <div id="footer"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/components.js"></script>
  <script src="js/data.js"></script>
  <script>
    const typeColor = { design: 'var(--purple)', code: 'var(--cyan)', data: 'var(--brand)', analysis: '#10b981' };
    const typeBg = { design: 'rgba(128,64,216,.15)', code: 'rgba(0,196,255,.15)', data: 'rgba(91,108,245,.15)', analysis: 'rgba(16,185,129,.15)' };
    const gradients = [
      'linear-gradient(135deg,#00c4ff,#5b6cf5)',
      'linear-gradient(135deg,#5b6cf5,#8040d8)',
      'linear-gradient(135deg,#8040d8,#ec4899)',
      'linear-gradient(135deg,#10b981,#00c4ff)',
      'linear-gradient(135deg,#f59e0b,#ef4444)',
      'linear-gradient(135deg,#6366f1,#8040d8)',
    ];
    const previewColors = [
      '#1e1e2e', '#0d1117', '#111827', '#13131a', '#0f172a', '#1c1917'
    ];

    let activeType = 'all';

    function getAllItems() {
      const items = [];
      const candidates = getCandidates();
      candidates.forEach((c, ci) => {
        c.portfolio.filter(p => p.isPublic).forEach(p => {
          items.push({ ...p, candidate: c, ci });
        });
      });
      return items;
    }

    function renderPills() {
      const types = ['all', 'design', 'code', 'data', 'analysis'];
      document.getElementById('filterPills').innerHTML = types.map(t =>
        `<button class="cat-pill ${activeType === t ? 'active' : ''}" onclick="setType('${t}',this)">${t === 'all' ? 'All' : t.charAt(0).toUpperCase() + t.slice(1)}</button>`
      ).join('');
    }

    function setType(t, btn) {
      activeType = t;
      renderPills();
      render();
    }

    function previewHTML(item, idx) {
      const type = item.previewType;
      if (type === 'image') {
        return `<div class="pg-preview" style="background:${previewColors[idx % previewColors.length]}">
      <div style="display:flex;flex-direction:column;align-items:center;gap:12px;opacity:.5">
        <span class="material-symbols-rounded" style="font-size:48px;color:var(--text4)">image</span>
        <span style="font-size:12px;color:var(--text4);font-weight:600">Preview Image</span>
      </div>
      <span class="pg-type-badge" style="background:${typeBg[item.type] || typeBg.data};color:${typeColor[item.type] || typeColor.data}">Image</span>
      ${item.score ? `<span class="pg-score">${item.score}/100</span>` : ''}
    </div>`;
      }
      if (type === 'website') {
        return `<div class="pg-preview" style="background:#0d1117">
      <div style="display:flex;align-items:center;gap:8px;position:absolute;top:10px;left:10px;right:50px;background:rgba(0,0,0,.5);border-radius:8px;padding:5px 10px;font-size:11px;font-family:var(--font-mono);color:var(--text4); width: max-content;">
        <span class="material-symbols-rounded" style="font-size:14px;color:#10b981">lock</span>
        <span>live-preview.unresu.me</span>
      </div>
      <div style="padding:40px 24px 24px;width:100%;height:100%;background:#0d1117">
        <div style="height:12px;background:rgba(91,108,245,.3);border-radius:4px;margin-bottom:8px;width:70%"></div>
        <div style="height:8px;background:rgba(255,255,255,.08);border-radius:4px;margin-bottom:6px;width:90%"></div>
        <div style="height:8px;background:rgba(255,255,255,.06);border-radius:4px;margin-bottom:12px;width:60%"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div style="height:60px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid rgba(255,255,255,.06)"></div>
          <div style="height:60px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid rgba(255,255,255,.06)"></div>
        </div>
      </div>
      <span class="pg-type-badge" style="background:${typeBg.code};color:${typeColor.code}">Website</span>
      ${item.score ? `<span class="pg-score">${item.score}/100</span>` : ''}
    </div>`;
      }
      // code / analysis
      return `<div class="pg-preview" style="background:#0d1117">
    <div class="pg-preview-code"><span style="color:#8040d8">def</span> <span style="color:#00c4ff">analyze</span><span style="color:var(--text2)">(data):</span><br>
&nbsp;&nbsp;<span style="color:#f59e0b">df</span> = pd.DataFrame(data)<br>
&nbsp;&nbsp;<span style="color:#f59e0b">result</span> = df.groupby(<span style="color:#10b981">'category'</span>)<br>
&nbsp;&nbsp;&nbsp;&nbsp;.agg({<span style="color:#10b981">'value'</span>: <span style="color:#10b981">'sum'</span>})<br>
&nbsp;&nbsp;<span style="color:#5b6cf5">return</span> result.reset_index()</div>
    <span class="pg-type-badge" style="background:${typeBg[item.type] || typeBg.data};color:${typeColor[item.type] || typeColor.data}">${item.type.charAt(0).toUpperCase() + item.type.slice(1)}</span>
    ${item.score ? `<span class="pg-score">${item.score}/100</span>` : ''}
  </div>`;
    }

    function render() {
      let items = getAllItems();
      if (activeType !== 'all') items = items.filter(p => p.type === activeType);

      document.getElementById('countLbl').textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;

      document.getElementById('pgGrid').innerHTML = items.map((item, idx) => {
        const c = item.candidate;
        const initials = c.name.split(' ').map(w => w[0]).join('').slice(0, 2);
        return `<div class="pg-card">
      ${previewHTML(item, idx)}
      <div class="pg-body">
        <div class="pg-task-title">${item.title}</div>
        <div class="pg-author">
          <div class="pg-av" style="background:${gradients[item.ci % gradients.length]}">${initials}</div>
          <div>
            <div class="pg-author-name">${c.name}</div>
            <div class="pg-author-uname">@${c.username} · Score ${c.score}</div>
          </div>
        </div>
        <div class="pg-footer">
          <span class="material-symbols-rounded" style="font-size:16px;color:var(--text4)">visibility</span>
          <span style="font-size:12px;color:var(--text4)">Public output</span>
          <a href="candidate-profile.html?u=${c.username}" style="margin-left:auto">View Profile →</a>
        </div>
      </div>
    </div>`;
      }).join('') || `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text4)"><span class="material-symbols-rounded" style="font-size:48px;display:block;margin-bottom:12px">photo_library</span>No public portfolio items found</div>`;

      gsap.from('.pg-card', { opacity: 0, y: 20, duration: .4, stagger: .06, ease: 'power2.out' });
    }

    renderPills();
    render();
  </script>
</body>

</html>
