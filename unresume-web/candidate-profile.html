<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Candidate Profile — Unresume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="css/globals.css">
<link rel="stylesheet" href="css/navbar.css">
<style>
.prof-hero{background:linear-gradient(160deg,rgba(91,108,245,.07),rgba(128,64,216,.07));border-bottom:1px solid var(--border);padding:48px 24px 0}
.prof-inner{max-width:960px;margin:0 auto}
.prof-top{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;padding-bottom:32px}
.prof-av{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:32px;font-weight:800;color:#fff;flex-shrink:0;border:3px solid rgba(255,255,255,.1)}
.prof-info{flex:1;min-width:220px}
.prof-name{font-family:var(--font-display);font-size:clamp(22px,4vw,32px);font-weight:800;color:var(--text1);letter-spacing:-.025em;margin-bottom:4px}
.prof-uname{font-size:14px;color:var(--text4);font-weight:600;margin-bottom:12px}
.prof-skills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.prof-skill{font-size:12px;font-weight:700;padding:4px 12px;border-radius:7px;background:rgba(91,108,245,.12);border:1px solid rgba(91,108,245,.22);color:var(--brand)}
.prof-follow{display:flex;gap:20px;font-size:13px;color:var(--text3)}
.prof-follow strong{color:var(--text1);font-family:var(--font-display)}
.prof-actions{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;align-items:flex-start}
.tab-bar{display:flex;gap:0;border-top:1px solid var(--border);margin-top:0}
.prof-tab{padding:14px 20px;font-size:14px;font-weight:700;color:var(--text4);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;text-decoration:none;display:block}
.prof-tab.active,.prof-tab:hover{color:var(--text1);border-bottom-color:var(--brand)}
.prof-wrap{max-width:960px;margin:0 auto;padding:36px 24px 80px}
/* Stats band */
.score-band{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:36px}
@media(max-width:700px){.score-band{grid-template-columns:repeat(2,1fr)}}
.score-blk{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:18px 16px;text-align:center}
.score-blk .sv{font-family:var(--font-display);font-size:26px;font-weight:800;color:var(--text1);line-height:1;margin-bottom:4px}
.score-blk .sl{font-size:11.5px;color:var(--text4);font-weight:600}
/* Portfolio grid */
.port-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px}
.port-item{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:border-color .2s}
.port-item:hover{border-color:rgba(91,108,245,.3)}
.port-preview{height:150px;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border)}
.port-body{padding:14px 16px}
.port-title{font-size:14px;font-weight:800;color:var(--text1);font-family:var(--font-display);margin-bottom:6px;line-height:1.3}
.port-meta{display:flex;align-items:center;justify-content:space-between}
.port-score{font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--cyan)}
.port-toggle-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text4);font-weight:600}
.port-locked{opacity:.4;pointer-events:none}
.is-owner .port-locked{opacity:1;pointer-events:auto}
/* Private badge */
.priv-badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:5px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444}
.pub-badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:5px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#10b981}
</style>
</head>
<body>
<div id="navbar"></div>

<div class="prof-hero">
  <div class="prof-inner">
    <div class="prof-top">
      <div class="prof-av" id="profAv"></div>
      <div class="prof-info">
        <div class="prof-name" id="profName"></div>
        <div class="prof-uname" id="profUname"></div>
        <div class="prof-skills" id="profSkills"></div>
        <div class="prof-follow">
          <span><strong id="profFollowers"></strong> followers</span>
          <span><strong id="profFollowing"></strong> following</span>
          <span><strong id="profTasks"></strong> tasks done</span>
        </div>
      </div>
      <div class="prof-actions" id="profActions"></div>
    </div>
    <div class="tab-bar">
      <a class="prof-tab active" onclick="showTab('portfolio',this)">Portfolio</a>
      <a class="prof-tab" onclick="showTab('activity',this)">Activity</a>
    </div>
  </div>
</div>

<div class="prof-wrap">
  <div class="score-band">
    <div class="score-blk"><div class="sv grad-text" id="profScore"></div><div class="sl">Skill Score</div></div>
    <div class="score-blk"><div class="sv" id="profRank" style="color:var(--cyan)"></div><div class="sl">Global Rank</div></div>
    <div class="score-blk"><div class="sv" id="profBadge"></div><div class="sl">Badge</div></div>
    <div class="score-blk"><div class="sv" id="profPublic" style="color:var(--brand)"></div><div class="sl">Public Items</div></div>
  </div>

  <div id="portfolioTab">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <h2 style="font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--text1)">Portfolio</h2>
      <span id="ownerNote" style="font-size:12.5px;color:var(--text4)"></span>
    </div>
    <div class="port-grid" id="portGrid"></div>
  </div>

  <div id="activityTab" style="display:none">
    <div style="display:flex;flex-direction:column;gap:10px" id="actList">
      <div style="text-align:center;padding:60px 0;color:var(--text4)">No public activity yet.</div>
    </div>
  </div>
</div>

<div id="footer"></div>
<script src="js/components.js"></script>
<script src="js/data.js"></script>
<script>
const gradients = [
  'linear-gradient(135deg,#00c4ff,#5b6cf5)',
  'linear-gradient(135deg,#5b6cf5,#8040d8)',
  'linear-gradient(135deg,#8040d8,#ec4899)',
  'linear-gradient(135deg,#10b981,#00c4ff)',
  'linear-gradient(135deg,#f59e0b,#ef4444)',
  'linear-gradient(135deg,#6366f1,#8040d8)',
];
const typeIcon = {design:'palette',code:'code',data:'analytics',analysis:'query_stats'};
const typeColor = {design:'var(--purple)',code:'var(--cyan)',data:'var(--brand)',analysis:'#10b981'};

const params = new URLSearchParams(location.search);
const username = params.get('u');
const isOwner = !username || username === 'jayd'; // simulate owner if no user param or is "self"

const candidates = getCandidates();
const c = username ? candidates.find(x => x.username === username) : candidates[0];
const ci = candidates.indexOf(c);

if (!c) {
  document.body.innerHTML = '<div style="text-align:center;padding:120px 24px;color:var(--text3)">Candidate not found.</div>';
} else {
  const initials = c.name.split(' ').map(w=>w[0]).join('').slice(0,2);
  document.getElementById('profAv').style.background = gradients[ci%gradients.length];
  document.getElementById('profAv').textContent = initials;
  document.getElementById('profName').textContent = c.name;
  document.getElementById('profUname').textContent = '@' + c.username;
  document.getElementById('profFollowers').textContent = c.followers;
  document.getElementById('profFollowing').textContent = c.following;
  document.getElementById('profTasks').textContent = c.tasksCompleted;
  document.getElementById('profScore').textContent = c.score;
  document.getElementById('profRank').textContent = '#' + c.rank;
  const BADGE_CFG = {
    Diamond: { color:'#00c4ff', bg:'rgba(0,196,255,.13)', border:'rgba(0,196,255,.38)', shadow:'0 0 16px rgba(0,196,255,.22)' },
    Gold:    { color:'#f59e0b', bg:'rgba(245,158,11,.13)', border:'rgba(245,158,11,.38)', shadow:'0 0 14px rgba(245,158,11,.18)' },
    Silver:  { color:'#94a3b8', bg:'rgba(148,163,184,.1)',  border:'rgba(148,163,184,.32)', shadow:'none' },
  };
  const bc = BADGE_CFG[c.badge] || { color:'var(--text2)', bg:'rgba(255,255,255,.06)', border:'var(--border)', shadow:'none' };
  document.getElementById('profBadge').innerHTML = `<span style="display:inline-block;padding:3px 12px;background:${bc.bg};border:1px solid ${bc.border};border-radius:100px;font-size:11.5px;font-weight:800;color:${bc.color};box-shadow:${bc.shadow};letter-spacing:.04em">${c.badge}</span>`;
  document.getElementById('profPublic').textContent = c.portfolio.filter(p=>p.isPublic).length;

  document.getElementById('profSkills').innerHTML = c.skills.map(s =>
    `<span class="prof-skill">${s}</span>`
  ).join('');

  document.getElementById('profActions').innerHTML = isOwner
    ? `<a href="candidate-dashboard.html" class="btn-ghost" style="font-size:13px;padding:9px 16px">My Dashboard</a>
       <button class="btn-primary" style="font-size:13px;padding:9px 18px" onclick="alert('Edit profile coming soon!')">Edit Profile</button>`
    : `<button class="btn-ghost" style="font-size:13px;padding:9px 16px" onclick="this.textContent=this.textContent==='Following'?'Follow':'Following'">Follow</button>
       <a href="chat.html" class="btn-primary" style="font-size:13px;padding:9px 18px">Message</a>`;

  if (isOwner) {
    document.getElementById('ownerNote').textContent = 'Toggle visibility per item. Only public items show to others.';
  }

  let portfolio = isOwner ? c.portfolio : c.portfolio.filter(p => p.isPublic);

  function renderPort() {
    document.getElementById('portGrid').innerHTML = portfolio.map((p, i) => {
      const icon = typeIcon[p.type] || 'task_alt';
      const color = typeColor[p.type] || 'var(--brand)';
      return `<div class="port-item">
        <div class="port-preview">
          <span class="material-symbols-rounded" style="font-size:48px;color:${color};opacity:.4">${icon}</span>
        </div>
        <div class="port-body">
          <div class="port-title">${p.title}</div>
          <div class="port-meta">
            ${p.score ? `<span class="port-score">${p.score}/100</span>` : '<span></span>'}
            <div class="port-toggle-row">
              ${isOwner ? `
                <div class="toggle-track ${p.isPublic?'on':''}" id="tog-${p.id}" onclick="toggleItem('${p.id}',this)" title="${p.isPublic?'Public — click to hide':'Private — click to show'}"></div>
                <span id="tog-lbl-${p.id}">${p.isPublic?'<span class="pub-badge">Public</span>':'<span class="priv-badge">Private</span>'}</span>
              ` : '<span class="pub-badge">Public</span>'}
            </div>
          </div>
        </div>
      </div>`;
    }).join('') || `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text4)">
      <span class="material-symbols-rounded" style="font-size:48px;display:block;margin-bottom:12px">lock</span>
      No public portfolio items yet.
    </div>`;
  }

  function toggleItem(id, el) {
    const item = portfolio.find(p => p.id == id);
    if (!item) return;
    item.isPublic = !item.isPublic;
    el.classList.toggle('on', item.isPublic);
    const lbl = document.getElementById('tog-lbl-' + id);
    lbl.innerHTML = item.isPublic ? '<span class="pub-badge">Public</span>' : '<span class="priv-badge">Private</span>';
    document.getElementById('profPublic').textContent = portfolio.filter(p=>p.isPublic).length;
  }

  window.toggleItem = toggleItem;
  renderPort();
}

function showTab(tab, el) {
  document.querySelectorAll('.prof-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('portfolioTab').style.display = tab === 'portfolio' ? '' : 'none';
  document.getElementById('activityTab').style.display = tab === 'activity' ? '' : 'none';
}
</script>
</body>
</html>
