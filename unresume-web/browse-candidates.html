<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Browse Candidates — Unresume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="css/globals.css">
<link rel="stylesheet" href="css/navbar.css">
<style>
.bc-hero{padding:56px 0 44px;text-align:center;border-bottom:1px solid var(--border);background:linear-gradient(160deg,rgba(0,196,255,.06),rgba(91,108,245,.06))}
.bc-hero h1{font-family:var(--font-display);font-size:clamp(26px,4vw,40px);font-weight:800;color:var(--text1);letter-spacing:-.03em;margin-bottom:10px}
.bc-hero p{font-size:14.5px;color:var(--text3);margin-bottom:28px}
.search-bar{display:flex;align-items:center;gap:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:11px 18px;max-width:480px;margin:0 auto;transition:border-color .15s}
.search-bar:focus-within{border-color:rgba(91,108,245,.45)}
.search-bar input{flex:1;background:none;border:none;outline:none;font-size:15px;color:var(--text1);font-family:var(--font-body)}
.search-bar input::placeholder{color:var(--text4)}
.bc-wrap{max-width:1100px;margin:0 auto;padding:40px 24px 80px}
.bc-toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:28px}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.bc-count{font-size:13.5px;color:var(--text4);font-weight:600;margin-left:auto}
.cand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.cand-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:24px 20px;display:flex;flex-direction:column;gap:12px;text-decoration:none;transition:border-color .2s,transform .2s;position:relative;overflow:hidden}
.cand-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(91,108,245,.04),rgba(128,64,216,.04));opacity:0;transition:opacity .2s}
.cand-card:hover{border-color:rgba(91,108,245,.35);transform:translateY(-3px)}
.cand-card:hover::before{opacity:1}
.cand-top{display:flex;align-items:flex-start;gap:12px}
.cand-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
.cand-name{font-size:15px;font-weight:800;color:var(--text1);margin-bottom:2px;font-family:var(--font-display)}
.cand-uname{font-size:12.5px;color:var(--text4);font-weight:600}
.cand-badge{margin-left:auto;font-size:11px;font-weight:800;padding:3px 10px;border-radius:6px}
.cand-score-row{display:flex;align-items:center;gap:8px}
.cand-score{font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--text1)}
.cand-skills{display:flex;flex-wrap:wrap;gap:6px}
.cand-skill{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:7px;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text3)}
.cand-stats{display:flex;gap:16px;border-top:1px solid var(--border);padding-top:12px}
.cand-stat{display:flex;flex-direction:column;gap:2px}
.cand-stat-v{font-size:14px;font-weight:800;color:var(--text1);font-family:var(--font-display)}
.cand-stat-l{font-size:11px;color:var(--text4);font-weight:600}
</style>
</head>
<body>
<div id="navbar"></div>

<div class="bc-hero">
  <h1>Browse <span class="grad-text">Top Talent</span></h1>
  <p>Find candidates proven through real tasks — not just CVs.</p>
  <div class="search-bar">
    <span class="material-symbols-rounded" style="font-size:20px;color:var(--text4)">search</span>
    <input type="text" id="searchInput" placeholder="Search by name or skill…" oninput="render()">
  </div>
</div>

<div class="bc-wrap">
  <div class="bc-toolbar">
    <div class="filter-pills" id="filterPills"></div>
    <span class="bc-count" id="countLbl"></span>
  </div>
  <div class="cand-grid" id="candGrid"></div>
</div>

<div id="footer"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="js/components.js"></script>
<script src="js/data.js"></script>
<script>
const gradients = [
  'linear-gradient(135deg,#00c4ff,#5b6cf5)',
  'linear-gradient(135deg,#5b6cf5,#8040d8)',
  'linear-gradient(135deg,#8040d8,#ec4899)',
  'linear-gradient(135deg,#10b981,#00c4ff)',
  'linear-gradient(135deg,#f59e0b,#ef4444)',
  'linear-gradient(135deg,#6366f1,#8040d8)',
];
const badgeColor = {Elite:'#f59e0b',Pro:'var(--brand)',Rising:'var(--cyan)'};
const badgeBg = {Elite:'rgba(245,158,11,.12)',Pro:'rgba(91,108,245,.12)',Rising:'rgba(0,196,255,.12)'};

let activeSkill = 'all';

function getAllSkills() {
  const set = new Set();
  getCandidates().forEach(c => c.skills.forEach(s => set.add(s)));
  return [...set];
}

function renderPills() {
  const skills = getAllSkills();
  document.getElementById('filterPills').innerHTML = `
    <button class="cat-pill ${activeSkill==='all'?'active':''}" onclick="setSkill('all',this)">All</button>
    ${skills.map(s => `<button class="cat-pill ${activeSkill===s?'active':''}" onclick="setSkill('${s}',this)">${s}</button>`).join('')}
  `;
}

function setSkill(s, btn) {
  activeSkill = s;
  renderPills();
  render();
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = getCandidates().filter(c => {
    const matchQ = !q || c.name.toLowerCase().includes(q) || c.skills.some(s => s.toLowerCase().includes(q));
    const matchSkill = activeSkill === 'all' || c.skills.includes(activeSkill);
    return matchQ && matchSkill;
  });

  document.getElementById('countLbl').textContent = `${list.length} candidate${list.length!==1?'s':''} found`;

  document.getElementById('candGrid').innerHTML = list.map((c, i) => {
    const initials = c.name.split(' ').map(w=>w[0]).join('').slice(0,2);
    return `<a href="candidate-profile.html?u=${c.username}" class="cand-card">
      <div class="cand-top">
        <div class="cand-av" style="background:${gradients[i%gradients.length]}">${initials}</div>
        <div style="flex:1;min-width:0">
          <div class="cand-name">${c.name}</div>
          <div class="cand-uname">@${c.username}</div>
        </div>
        <span class="cand-badge" style="background:${badgeBg[c.badge]||'var(--bg-elevated)'};color:${badgeColor[c.badge]||'var(--text4)'}">${c.badge}</span>
      </div>
      <div class="cand-score-row">
        <span class="cand-score">${c.score}</span>
        <div>
          <div style="font-size:11px;color:var(--text4);font-weight:600">Skill Score</div>
          <div style="font-size:11.5px;color:var(--cyan);font-weight:700">Rank #${c.rank}</div>
        </div>
      </div>
      <div class="cand-skills">${c.skills.slice(0,4).map(s=>`<span class="cand-skill">${s}</span>`).join('')}${c.skills.length>4?`<span class="cand-skill" style="color:var(--brand)">+${c.skills.length-4}</span>`:''}</div>
      <div class="cand-stats">
        <div class="cand-stat"><div class="cand-stat-v">${c.tasksCompleted}</div><div class="cand-stat-l">Tasks Done</div></div>
        <div class="cand-stat"><div class="cand-stat-v">${c.followers}</div><div class="cand-stat-l">Followers</div></div>
        <div class="cand-stat"><div class="cand-stat-v">${c.portfolio.filter(p=>p.isPublic).length}</div><div class="cand-stat-l">Portfolio</div></div>
      </div>
    </a>`;
  }).join('') || `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text4)"><span class="material-symbols-rounded" style="font-size:48px;display:block;margin-bottom:12px">search_off</span>No candidates found</div>`;

  gsap.from('.cand-card', {opacity:0, y:16, duration:.4, stagger:.05, ease:'power2.out'});
}

renderPills();
render();
</script>
</body>
</html>
