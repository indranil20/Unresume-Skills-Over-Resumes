<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Register Company — Unresume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="css/globals.css">
<link rel="stylesheet" href="css/navbar.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px}
.auth-orb1{position:fixed;width:500px;height:500px;background:radial-gradient(circle,rgba(0,196,255,.1) 0%,transparent 70%);top:-100px;right:-150px;border-radius:50%;pointer-events:none}
.auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:24px;padding:36px 40px;width:100%;max-width:480px;position:relative;z-index:1}
@media(max-width:520px){.auth-card{padding:28px 22px}}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:420px){.grid2{grid-template-columns:1fr}}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
.type-btn{background:var(--bg-elevated);border:1px solid var(--border);border-radius:12px;padding:14px 12px;cursor:pointer;text-align:left;transition:all .15s}
.type-btn:hover{border-color:rgba(0,196,255,.3)}
.type-btn.active{background:rgba(0,196,255,.1);border-color:rgba(0,196,255,.4)}
.submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,#00c4ff,#5b6cf5);border:none;border-radius:12px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s;margin-top:4px}
.submit-btn:hover{opacity:.9}
</style>
</head>
<body>
<div class="auth-orb1"></div>
<div class="auth-card">
  <a href="register.html" style="display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:var(--text3);text-decoration:none;margin-bottom:16px"><span class="material-symbols-rounded" style="font-size:16px">arrow_back</span> Back</a>

  <h1 style="font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--text1);margin-bottom:6px">Register your company</h1>
  <p style="font-size:14px;color:var(--text3);margin-bottom:22px">Post jobs with tasks and hire through skill proof.</p>

  <div class="type-grid">
    <button class="type-btn active" id="hrBtn" onclick="setType('hr')">
      <span class="material-symbols-rounded" style="font-size:20px;color:var(--cyan);display:block;margin-bottom:6px">business_center</span>
      <div style="font-size:13px;font-weight:700;color:var(--text1);margin-bottom:2px">HR / Recruiter</div>
      <div style="font-size:11.5px;color:var(--text4)">Contact and hire candidates</div>
    </button>
    <button class="type-btn" id="iwBtn" onclick="setType('interviewer')">
      <span class="material-symbols-rounded" style="font-size:20px;color:var(--text3);display:block;margin-bottom:6px">rate_review</span>
      <div style="font-size:13px;font-weight:700;color:var(--text1);margin-bottom:2px">Interviewer</div>
      <div style="font-size:11.5px;color:var(--text4)">Create tasks, score submissions</div>
    </button>
  </div>

  <form style="display:flex;flex-direction:column;gap:16px" onsubmit="handleSubmit(event)">
    <div class="form-field"><label class="form-label">Company Name</label><div class="input-wrap"><span class="material-symbols-rounded">business</span><input type="text" placeholder="Acme Corp" required></div></div>
    <div class="form-field"><label class="form-label">Website</label><div class="input-wrap"><span class="material-symbols-rounded">link</span><input type="url" placeholder="https://yourcompany.com"></div></div>
    <div class="grid2">
      <div class="form-field"><label class="form-label">First Name</label><div class="input-wrap"><input type="text" placeholder="Alex" required></div></div>
      <div class="form-field"><label class="form-label">Last Name</label><div class="input-wrap"><input type="text" placeholder="Smith" required></div></div>
    </div>
    <div class="form-field"><label class="form-label">Work Email</label><div class="input-wrap"><span class="material-symbols-rounded">mail</span><input type="email" placeholder="you@company.com" required></div></div>
    <div class="form-field"><label class="form-label">Password</label><div class="input-wrap"><span class="material-symbols-rounded">lock</span><input type="password" placeholder="Min 8 characters" required minlength="8"></div></div>
    <button type="submit" class="submit-btn" id="submitBtn">Create Company Account</button>
  </form>

  <p style="margin-top:20px;text-align:center;font-size:13.5px;color:var(--text3)">Have an account? <a href="login.html" style="color:var(--brand);font-weight:700;text-decoration:none">Sign In →</a></p>
</div>

<script src="js/components.js"></script>
<script>
let role = 'hr';
function setType(r) {
  role = r;
  document.getElementById('hrBtn').classList.toggle('active', r==='hr');
  document.getElementById('iwBtn').classList.toggle('active', r==='interviewer');
  document.getElementById('hrBtn').querySelector('span').style.color = r==='hr'?'var(--cyan)':'var(--text3)';
  document.getElementById('iwBtn').querySelector('span').style.color = r==='interviewer'?'var(--cyan)':'var(--text3)';
}
function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;
  setTimeout(() => { location.href = role==='hr'?'hr-dashboard.html':'interviewer-dashboard.html'; }, 900);
}
</script>
</body>
</html>
