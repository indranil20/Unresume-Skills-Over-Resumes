<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Feed — Unresume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="css/globals.css">
<link rel="stylesheet" href="css/navbar.css">
<style>
.feed-root{display:flex;height:100vh;overflow:hidden}
.feed-sidebar{width:240px;border-right:1px solid var(--border);flex-shrink:0;overflow-y:auto}
.feed-main{flex:1;overflow-y:auto}
.feed-right{width:280px;border-left:1px solid var(--border);flex-shrink:0;overflow-y:auto}
@media(max-width:1000px){.feed-right{display:none}}
@media(max-width:700px){.feed-sidebar{display:none}}
.feed-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.feed-title{font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--text1)}
.feed-nav-item{display:flex;align-items:center;gap:12px;padding:11px 18px;font-size:14px;font-weight:700;color:var(--text3);cursor:pointer;border-radius:11px;margin:2px 10px;transition:all .15s;text-decoration:none}
.feed-nav-item:hover{background:var(--bg-elevated);color:var(--text1)}
.feed-nav-item.active{background:rgba(91,108,245,.1);color:var(--brand)}
.feed-content{max-width:600px;margin:0 auto;padding:28px 24px 80px}
/* Feed cards */
.feed-card{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:14px;transition:border-color .15s}
.feed-card:hover{border-color:rgba(91,108,245,.2)}
.feed-actor{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.feed-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.feed-actor-name{font-size:14px;font-weight:700;color:var(--text1);margin-bottom:2px}
.feed-actor-meta{font-size:12px;color:var(--text4)}
.feed-action{font-size:13.5px;color:var(--text3);line-height:1.6;margin-bottom:12px}
.feed-action strong{color:var(--text1)}
.feed-card-inner{background:var(--bg-elevated);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.feed-score{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:13.5px;font-weight:700}
.feed-footer{display:flex;align-items:center;gap:16px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.feed-action-btn{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--text4);cursor:pointer;transition:color .15s;background:none;border:none;padding:0}
.feed-action-btn:hover{color:var(--brand)}
.feed-action-btn.liked{color:#ef4444}
/* Right panel */
.right-sec{padding:18px 18px;border-bottom:1px solid var(--border)}
.right-title{font-size:13px;font-weight:800;color:var(--text1);font-family:var(--font-display);margin-bottom:14px}
.follow-item{display:flex;align-items:center;gap:10px;padding:8px 0}
.follow-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.follow-name{font-size:13px;font-weight:700;color:var(--text1)}
.follow-score{font-size:11.5px;color:var(--text4)}
.follow-btn{margin-left:auto;font-size:12px;font-weight:700;padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-elevated);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.follow-btn:hover,.follow-btn.following{background:rgba(91,108,245,.12);border-color:rgba(91,108,245,.3);color:var(--brand)}
</style>
</head>
<body>
<div class="feed-root">
  <!-- Left nav -->
  <div class="feed-sidebar">
    <div class="feed-header">
      <div style="display:flex;align-items:center">
        <div style="background:#fff;border-radius:8px;padding:3px 9px;display:flex;align-items:center;box-shadow:0 2px 10px rgba(91,108,245,.2)">
          <img src="images/unresume-logo.png" alt="Unresume" style="height:22px;display:block;width:auto">
        </div>
      </div>
    </div>
    <div style="padding:10px 0">
      <a class="feed-nav-item active" href="feed.html"><span class="material-symbols-rounded" style="font-size:20px">home</span> Home</a>
      <a class="feed-nav-item" href="leaderboard.html"><span class="material-symbols-rounded" style="font-size:20px">leaderboard</span> Leaderboard</a>
      <a class="feed-nav-item" href="jobs.html"><span class="material-symbols-rounded" style="font-size:20px">work</span> Jobs</a>
      <a class="feed-nav-item" href="portfolio-gallery.html"><span class="material-symbols-rounded" style="font-size:20px">photo_library</span> Gallery</a>
      <a class="feed-nav-item" href="browse-candidates.html"><span class="material-symbols-rounded" style="font-size:20px">group</span> Candidates</a>
      <a class="feed-nav-item" href="chat.html"><span class="material-symbols-rounded" style="font-size:20px">chat</span> Messages</a>
      <a class="feed-nav-item" href="candidate-dashboard.html"><span class="material-symbols-rounded" style="font-size:20px">dashboard</span> Dashboard</a>
      <div style="height:1px;background:var(--border);margin:10px 18px"></div>
      <a class="feed-nav-item" href="candidate-profile.html"><span class="material-symbols-rounded" style="font-size:20px">person</span> My Profile</a>
      <a class="feed-nav-item" href="login.html"><span class="material-symbols-rounded" style="font-size:20px">logout</span> Sign Out</a>
    </div>
  </div>

  <!-- Feed -->
  <div class="feed-main">
    <div class="feed-header" style="position:sticky;top:0;z-index:10;background:rgba(9,9,11,.85);backdrop-filter:blur(12px)">
      <span class="feed-title">Your Feed</span>
      <div style="display:flex;gap:8px">
        <button class="cat-pill active" onclick="filterFeed('all',this)">All</button>
        <button class="cat-pill" onclick="filterFeed('submission',this)">Submissions</button>
        <button class="cat-pill" onclick="filterFeed('follow',this)">Follows</button>
      </div>
    </div>
    <div class="feed-content" id="feedList"></div>
  </div>

  <!-- Right panel -->
  <div class="feed-right">
    <div class="right-sec">
      <div class="right-title">Who to Follow</div>
      <div id="whoToFollow"></div>
    </div>
    <div class="right-sec">
      <div class="right-title">Trending Skills</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px" id="trendSkills"></div>
    </div>
    <div class="right-sec">
      <a href="jobs.html" style="display:block;background:linear-gradient(135deg,rgba(91,108,245,.12),rgba(128,64,216,.12));border:1px solid rgba(91,108,245,.2);border-radius:14px;padding:18px 16px;text-decoration:none">
        <div style="font-size:14px;font-weight:800;color:var(--text1);font-family:var(--font-display);margin-bottom:6px">New Job Tasks Available</div>
        <div style="font-size:12.5px;color:var(--text3);line-height:1.5;margin-bottom:10px">3 new job-linked tasks posted this week. Prove your skills.</div>
        <span style="font-size:12.5px;font-weight:700;color:var(--brand)">Browse Jobs →</span>
      </a>
    </div>
  </div>
</div>

<script src="js/components.js"></script>
<script src="js/data.js"></script>
<script>
const gradients = [
  'linear-gradient(135deg,#00c4ff,#5b6cf5)',
  'linear-gradient(135deg,#5b6cf5,#8040d8)',
  'linear-gradient(135deg,#8040d8,#ec4899)',
  'linear-gradient(135deg,#10b981,#00c4ff)',
  'linear-gradient(135deg,#f59e0b,#ef4444)',
  'linear-gradient(135deg,#6366f1,#8040d8)',
];
const typeIcon = {
  submission:{icon:'task_alt',color:'var(--cyan)',label:'submitted a task'},
  score:{icon:'grade',color:'var(--brand)',label:'received a score'},
  follow:{icon:'person_add',color:'var(--purple)',label:'started following'},
  badge:{icon:'emoji_events',color:'#f59e0b',label:'earned a badge'},
  job:{icon:'work',color:'#10b981',label:'applied for a job'},
};

let activeFilter = 'all';
const likedPosts = new Set();

function filterFeed(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toggleLike(id, btn) {
  if (likedPosts.has(id)) {
    likedPosts.delete(id);
    btn.classList.remove('liked');
    const cnt = btn.querySelector('.like-cnt');
    if (cnt) cnt.textContent = parseInt(cnt.textContent) - 1;
  } else {
    likedPosts.add(id);
    btn.classList.add('liked');
    const cnt = btn.querySelector('.like-cnt');
    if (cnt) cnt.textContent = parseInt(cnt.textContent) + 1;
  }
}

function render() {
  let items = getFeed();
  if (activeFilter !== 'all') items = items.filter(f => f.type === activeFilter);

  document.getElementById('feedList').innerHTML = items.map((item, i) => {
    const t = typeIcon[item.type] || typeIcon.submission;
    const initials = item.actorName.split(' ').map(w=>w[0]).join('').slice(0,2);
    const likes = Math.floor(Math.random()*20)+1;
    return `<div class="feed-card">
      <div class="feed-actor">
        <div class="feed-av" style="background:${gradients[i%gradients.length]}">${initials}</div>
        <div>
          <div class="feed-actor-name">${item.actorName}</div>
          <div class="feed-actor-meta">@${item.actorUsername} · ${item.time}</div>
        </div>
        <div style="margin-left:auto;width:32px;height:32px;border-radius:8px;background:rgba(${t.color.includes('cyan')?'6,182,212':t.color.includes('brand')?'79,110,247':t.color.includes('purple')?'139,92,246':'245,158,11'},.1);display:flex;align-items:center;justify-content:center">
          <span class="material-symbols-rounded" style="font-size:17px;color:${t.color}">${t.icon}</span>
        </div>
      </div>
      <div class="feed-action">${item.actorName} <strong>${item.action}</strong> ${item.target ? `<a href="#" style="color:var(--brand);font-weight:700;text-decoration:none">"${item.target}"</a>` : ''} ${item.score ? `and scored <span class="feed-score" style="color:var(--cyan)">${item.score}/100</span>` : ''}</div>
      ${item.target ? `<div class="feed-card-inner">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="material-symbols-rounded" style="font-size:20px;color:${t.color}">${t.icon}</span>
          <div style="font-size:13.5px;font-weight:700;color:var(--text1)">${item.target}</div>
          ${item.score ? `<span style="margin-left:auto;font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--cyan)">${item.score}/100</span>` : ''}
        </div>
      </div>` : ''}
      <div class="feed-footer">
        <button class="feed-action-btn ${likedPosts.has(item.id)?'liked':''}" onclick="toggleLike('${item.id}',this)">
          <span class="material-symbols-rounded" style="font-size:17px">${likedPosts.has(item.id)?'favorite':'favorite_border'}</span>
          <span class="like-cnt">${likes}</span>
        </button>
        <button class="feed-action-btn">
          <span class="material-symbols-rounded" style="font-size:17px">chat_bubble_outline</span>
          <span>${Math.floor(Math.random()*8)}</span>
        </button>
        <button class="feed-action-btn">
          <span class="material-symbols-rounded" style="font-size:17px">share</span>
        </button>
        <a href="candidate-profile.html?u=${item.actorUsername}" class="feed-action-btn" style="margin-left:auto">View Profile</a>
      </div>
    </div>`;
  }).join('') || `<div style="text-align:center;padding:60px 0;color:var(--text4)">
    <span class="material-symbols-rounded" style="font-size:48px;display:block;margin-bottom:12px">dynamic_feed</span>
    No activity yet. Follow more candidates!
  </div>`;
}

// Who to follow
const candidates = getCandidates().slice(0,4);
document.getElementById('whoToFollow').innerHTML = candidates.map((c, i) => {
  const initials = c.name.split(' ').map(w=>w[0]).join('').slice(0,2);
  return `<div class="follow-item">
    <div class="follow-av" style="background:${gradients[i%gradients.length]}">${initials}</div>
    <div style="flex:1;min-width:0">
      <div class="follow-name">${c.name}</div>
      <div class="follow-score">Score ${c.score} · Rank #${c.rank}</div>
    </div>
    <button class="follow-btn" onclick="this.textContent=this.textContent==='Follow'?'Following':'Follow';this.classList.toggle('following')">Follow</button>
  </div>`;
}).join('');

// Trending skills
const skills = ['React','Python','UI/UX','Node.js','Data Science','Figma'];
document.getElementById('trendSkills').innerHTML = skills.map(s =>
  `<a href="browse-candidates.html" class="cat-pill" style="font-size:12px">${s}</a>`
).join('');

render();
</script>
</body>
</html>
