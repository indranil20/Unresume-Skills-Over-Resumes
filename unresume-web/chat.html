<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chat — Unresume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="css/globals.css">
<link rel="stylesheet" href="css/navbar.css">
<style>
.chat-root{display:flex;height:100vh;overflow:hidden}
/* Left sidebar */
.conv-list{width:300px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:var(--bg-base)}
.conv-header{padding:18px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.conv-title{font-family:var(--font-display);font-size:17px;font-weight:800;color:var(--text1)}
.conv-search{padding:10px 14px;border-bottom:1px solid var(--border)}
.conv-search .search-wrap{display:flex;align-items:center;gap:8px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:8px 12px;transition:border-color .15s}
.conv-search .search-wrap:focus-within{border-color:rgba(91,108,245,.35)}
.conv-search input{flex:1;background:none;border:none;outline:none;font-size:13px;color:var(--text1);font-family:var(--font-body)}
.conv-search input::placeholder{color:var(--text4)}
.conv-item{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;transition:background .12s;border-left:3px solid transparent;text-decoration:none}
.conv-item:hover{background:var(--bg-elevated)}
.conv-item.active{background:rgba(91,108,245,.07);border-left-color:var(--brand)}
.conv-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:14px;font-weight:800;color:#fff;flex-shrink:0;position:relative}
.conv-av .unread-dot{position:absolute;top:1px;right:1px;width:9px;height:9px;border-radius:50%;background:var(--brand);border:2px solid var(--bg-base)}
.conv-meta{flex:1;min-width:0}
.conv-name{font-size:13.5px;font-weight:700;color:var(--text1);margin-bottom:2px}
.conv-preview{font-size:12px;color:var(--text4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-time{font-size:11px;color:var(--text4);white-space:nowrap;align-self:flex-start;margin-top:2px}
/* Right chat pane */
.chat-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-base)}
.chat-topbar{height:60px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 20px;background:var(--bg-card);flex-shrink:0}
.chat-messages{flex:1;overflow-y:auto;padding:24px 24px 16px;display:flex;flex-direction:column;gap:4px}
.msg-day{text-align:center;font-size:11.5px;color:var(--text4);font-weight:700;margin:12px 0;position:relative}
.msg-day::before{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:var(--border)}
.msg-day span{background:var(--bg-base);padding:0 12px;position:relative}
.msg-group{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-row.mine{flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.msg-bubble{max-width:65%;padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.55;word-break:break-word}
.msg-bubble.them{background:var(--bg-card);border:1px solid var(--border);color:var(--text2);border-bottom-left-radius:4px}
.msg-bubble.mine{background:linear-gradient(135deg,#5b6cf5,#8040d8);color:#fff;border-bottom-right-radius:4px; margin-left: auto;}
.msg-time{font-size:10.5px;color:var(--text4);padding:0 4px;white-space:nowrap}
.msg-sender{font-size:11px;color:var(--text4);font-weight:700;margin-bottom:2px;padding-left:38px}
/* Input */
.chat-input-wrap{padding:14px 20px;border-top:1px solid var(--border);background:var(--bg-card);flex-shrink:0}
.chat-input-bar{display:flex;align-items:flex-end;gap:10px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:14px;padding:10px 14px;transition:border-color .15s}
.chat-input-bar:focus-within{border-color:rgba(91,108,245,.4)}
.chat-input-bar textarea{flex:1;background:none;border:none;outline:none;font-size:14px;color:var(--text1);font-family:var(--font-body);resize:none;max-height:120px;line-height:1.5}
.chat-input-bar textarea::placeholder{color:var(--text4)}
.send-btn{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#5b6cf5,#8040d8);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.send-btn:hover{opacity:.85}
/* Empty state */
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text4)}
@media(max-width:600px){.conv-list{width:80px}.conv-meta,.conv-time{display:none}.conv-item{padding:10px;justify-content:center}}
</style>
</head>
<body>
<div class="chat-root">
  <!-- Conversation list -->
  <div class="conv-list">
    <div class="conv-header">
      <span class="conv-title">Messages</span>
      <button style="background:none;border:none;cursor:pointer;color:var(--text3);display:flex;align-items:center" title="New chat">
        <span class="material-symbols-rounded" style="font-size:20px">edit</span>
      </button>
    </div>
    <div class="conv-search">
      <div class="search-wrap">
        <span class="material-symbols-rounded" style="font-size:16px;color:var(--text4)">search</span>
        <input type="text" placeholder="Search conversations…" oninput="filterConvs(this.value)">
      </div>
    </div>
    <div id="convList" style="overflow-y:auto;flex:1"></div>
  </div>

  <!-- Chat pane -->
  <div class="chat-pane" id="chatPane">
    <div class="chat-empty" id="emptyState">
      <span class="material-symbols-rounded" style="font-size:56px">chat</span>
      <h3 style="font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--text2)">Select a conversation</h3>
      <p style="font-size:14px;text-align:center;max-width:260px;line-height:1.6">Choose a conversation from the list to start chatting</p>
    </div>
    <div id="activeChatView" style="display:none;flex-direction:column;flex:1;overflow:hidden;display:none">
      <div class="chat-topbar" id="chatTopbar"></div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-wrap">
        <div class="chat-input-bar">
          <textarea id="msgInput" rows="1" placeholder="Type a message…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" onclick="sendMessage()">
            <span class="material-symbols-rounded" style="font-size:18px;color:#fff">send</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/components.js"></script>
<script src="js/data.js"></script>
<script>
const gradients = [
  'linear-gradient(135deg,#00c4ff,#5b6cf5)',
  'linear-gradient(135deg,#8040d8,#ec4899)',
  'linear-gradient(135deg,#10b981,#00c4ff)',
];
const convData = getConversations();
let activeConvId = null;
let localMessages = {};
convData.forEach(c => { localMessages[c.id] = [...c.messages]; });

const ME = 'Jay D';
const ME_INITIALS = 'JD';
const ME_GRAD = 'linear-gradient(135deg,#5b6cf5,#8040d8)';

function renderConvList(filter='') {
  document.getElementById('convList').innerHTML = convData
    .filter(c => c.withName.toLowerCase().includes(filter.toLowerCase()))
    .map((c, i) => {
      const msgs = localMessages[c.id];
      const last = msgs[msgs.length-1];
      const initials = c.withName.split(' ').map(w=>w[0]).join('').slice(0,2);
      return `<a class="conv-item ${activeConvId===c.id?'active':''}" onclick="openConv(${c.id})" style="text-decoration:none">
        <div class="conv-av" style="background:${gradients[i%gradients.length]}">
          ${initials}
          ${c.unread ? '<span class="unread-dot"></span>':''}
        </div>
        <div class="conv-meta">
          <div class="conv-name">${c.withName}</div>
          <div class="conv-preview">${last?last.text:''}</div>
        </div>
        <div class="conv-time">${last?last.time:''}</div>
      </a>`;
    }).join('');
}

function openConv(id) {
  activeConvId = id;
  const conv = convData.find(c => c.id === id);
  if (!conv) return;
  conv.unread = false;

  document.getElementById('emptyState').style.display = 'none';
  const view = document.getElementById('activeChatView');
  view.style.display = 'flex';
  view.style.flexDirection = 'column';

  const ci = convData.indexOf(conv);
  document.getElementById('chatTopbar').innerHTML = `
    <div class="conv-av" style="background:${gradients[ci%gradients.length]};width:38px;height:38px;font-size:13px">${conv.withName.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
    <div style="flex:1">
      <div style="font-size:14.5px;font-weight:800;color:var(--text1);font-family:var(--font-display)">${conv.withName}</div>
      <div style="font-size:12px;color:var(--text4)">${conv.role}</div>
    </div>
    <button style="background:none;border:none;cursor:pointer;color:var(--text3)"><span class="material-symbols-rounded" style="font-size:20px">more_vert</span></button>
  `;

  renderMessages(id);
  renderConvList();
  document.getElementById('msgInput').focus();
}

function renderMessages(convId) {
  const conv = convData.find(c => c.id === convId);
  const ci = convData.indexOf(conv);
  const msgs = localMessages[convId];
  const container = document.getElementById('chatMessages');

  container.innerHTML = '';
  // Day divider
  container.innerHTML += `<div class="msg-day"><span>Today</span></div>`;

  msgs.forEach(m => {
    const isMine = m.from === 'me';
    const initials = isMine ? ME_INITIALS : conv.withName.split(' ').map(w=>w[0]).join('').slice(0,2);
    const grad = isMine ? ME_GRAD : gradients[ci%gradients.length];
    container.innerHTML += `<div class="msg-row ${isMine?'mine':''}">
      <div class="msg-av" style="background:${grad}">${initials}</div>
      <div>
        <div class="msg-bubble ${isMine?'mine':'them'}">${m.text}</div>
      </div>
      <span class="msg-time">${m.time}</span>
    </div>`;
  });
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text || !activeConvId) return;
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  localMessages[activeConvId].push({id: Date.now().toString(), from:'me', text, time});
  inp.value = '';
  inp.style.height = 'auto';
  renderMessages(activeConvId);
  renderConvList();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function filterConvs(q) {
  renderConvList(q);
}

renderConvList();
openConv(convData[0].id);
</script>
</body>
</html>
