<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Placements — Unresume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="css/globals.css">
<link rel="stylesheet" href="css/navbar.css">
<style>
.pl-head{padding:28px 0;border-bottom:1px solid var(--border);margin-bottom:28px}
.pl-head h1{font-family:var(--font-display);font-size:clamp(20px,3vw,26px);font-weight:800;color:var(--text1);letter-spacing:-.025em;margin-bottom:6px}
.pl-head p{font-size:13.5px;color:var(--text3)}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-family:var(--font-display);font-size:15px;font-weight:800;color:var(--text1)}
/* Global toggle */
.global-toggle-bar{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:18px 20px;display:flex;align-items:center;gap:16px;margin-bottom:28px}
.global-tog-info{flex:1}
.global-tog-title{font-size:14px;font-weight:800;color:var(--text1);margin-bottom:3px}
.global-tog-sub{font-size:12.5px;color:var(--text3)}
/* Company sections */
.comp-section{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:20px}
.comp-section-head{display:flex;align-items:center;gap:14px;padding:18px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.comp-section-head:hover{background:rgba(255,255,255,.015)}
.comp-logo{width:42px;height:42px;border-radius:11px;background:var(--bg-elevated);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.comp-info{flex:1}
.comp-name{font-size:15px;font-weight:800;color:var(--text1);font-family:var(--font-display)}
.comp-meta{font-size:12.5px;color:var(--text4)}
.comp-body{padding:16px 18px;display:flex;flex-direction:column;gap:12px}
/* Student placement rows */
.pl-student-row{display:flex;align-items:center;gap:14px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:13px;padding:13px 14px;transition:border-color .15s}
.pl-student-row:hover{border-color:rgba(91,108,245,.2)}
.pl-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.pl-name{font-size:13.5px;font-weight:700;color:var(--text1);margin-bottom:2px}
.pl-role{font-size:12px;color:var(--text4)}
.pl-score{font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--cyan);margin-right:8px}
.pl-toggle-row{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.pl-label{font-size:12px;font-weight:700;min-width:45px;text-align:right}
</style>
</head>
<body>
<div class="dash-root">
  <div id="sidebar" data-role="academy"></div>
  <div class="dash-content">
    <header class="dash-topbar">
      <div class="topbar-search">
        <span class="material-symbols-rounded" style="font-size:18px;color:var(--text4)">search</span>
        <input type="text" placeholder="Search placements…">
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="topbar-icon-btn"><span class="material-symbols-rounded" style="font-size:20px">notifications</span></button>
        <div class="topbar-avatar" style="background:linear-gradient(135deg,#8040d8,#5b6cf5)">AC</div>
      </div>
    </header>
    <main class="dash-main">
      <div class="pl-head">
        <h1>Placement <span class="grad-text">Portfolio</span></h1>
        <p>Control which companies can see your students' placements. Toggle globally or per-student, per-company.</p>
      </div>

      <!-- Global toggle -->
      <div class="global-toggle-bar">
        <div style="width:44px;height:44px;border-radius:12px;background:rgba(128,64,216,.1);border:1px solid rgba(128,64,216,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <span class="material-symbols-rounded" style="font-size:22px;color:var(--purple)">public</span>
        </div>
        <div class="global-tog-info">
          <div class="global-tog-title">Global Portfolio Visibility</div>
          <div class="global-tog-sub">When ON, all companies can see placement portfolio by default</div>
        </div>
        <div class="toggle-track on" id="globalToggle" onclick="handleGlobalToggle(this)"></div>
        <span id="globalLabel" style="font-size:13px;font-weight:800;color:#10b981;min-width:60px">Public</span>
      </div>

      <!-- Per-company placement sections -->
      <div class="sec-head"><span class="sec-title">Company Placements</span><span style="font-size:12px;color:var(--text4)">3 companies</span></div>
      <div id="compSections"></div>
    </main>
  </div>
</div>

<script src="js/components.js"></script>
<script src="js/data.js"></script>
<script>
const gradients = [
  'linear-gradient(135deg,#00c4ff,#5b6cf5)',
  'linear-gradient(135deg,#5b6cf5,#8040d8)',
  'linear-gradient(135deg,#8040d8,#ec4899)',
  'linear-gradient(135deg,#10b981,#00c4ff)',
  'linear-gradient(135deg,#f59e0b,#ef4444)',
  'linear-gradient(135deg,#6366f1,#8040d8)',
];

const students = getCandidates();
const companies = [
  {
    id:'c1', logo:'🏢', name:'TechCorp', role:'Frontend Engineer',
    isVisible:true,
    students: students.slice(0,3).map((s,i) => ({...s, isVisible:i<2, placedDate:'Jan 2024', salary:'₹18 LPA'}))
  },
  {
    id:'c2', logo:'💼', name:'DataSoft', role:'Data Analyst',
    isVisible:true,
    students: students.slice(2,5).map((s,i) => ({...s, isVisible:true, placedDate:'Mar 2024', salary:'₹14 LPA'}))
  },
  {
    id:'c3', logo:'🚀', name:'StartupXYZ', role:'Full Stack Dev',
    isVisible:false,
    students: students.slice(0,2).map((s,i) => ({...s, isVisible:false, placedDate:'Jun 2024', salary:'₹22 LPA'}))
  },
];

let globalOn = true;
const expanded = new Set(['c1','c2','c3']);

function handleGlobalToggle(el) {
  el.classList.toggle('on');
  globalOn = el.classList.contains('on');
  const lbl = document.getElementById('globalLabel');
  lbl.textContent = globalOn ? 'Public' : 'Private';
  lbl.style.color = globalOn ? '#10b981' : 'var(--text4)';
  // Cascade to all company toggles
  companies.forEach(c => { c.isVisible = globalOn; });
  render();
}

function toggleCompany(cid, el) {
  const c = companies.find(x=>x.id===cid);
  c.isVisible = !c.isVisible;
  el.classList.toggle('on', c.isVisible);
  const lbl = document.getElementById('clbl-'+cid);
  lbl.textContent = c.isVisible ? 'Shown' : 'Hidden';
  lbl.style.color = c.isVisible ? '#10b981' : 'var(--text4)';
}

function toggleStudent(cid, sid, el) {
  const c = companies.find(x=>x.id===cid);
  const s = c.students.find(x=>x.username===sid);
  s.isVisible = !s.isVisible;
  el.classList.toggle('on', s.isVisible);
  const lbl = document.getElementById(`slbl-${cid}-${sid}`);
  lbl.textContent = s.isVisible ? 'Shown' : 'Hidden';
  lbl.style.color = s.isVisible ? '#10b981' : 'var(--text4)';
}

function toggleExpand(cid) {
  expanded.has(cid) ? expanded.delete(cid) : expanded.add(cid);
  render();
}

function render() {
  document.getElementById('compSections').innerHTML = companies.map((c, ci) => {
    const isExp = expanded.has(c.id);
    return `<div class="comp-section">
      <div class="comp-section-head" onclick="toggleExpand('${c.id}')">
        <div class="comp-logo">${c.logo}</div>
        <div class="comp-info">
          <div class="comp-name">${c.name}</div>
          <div class="comp-meta">${c.role} · ${c.students.length} students placed</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px" onclick="event.stopPropagation()">
          <span style="font-size:12px;color:var(--text4)">All students:</span>
          <div class="toggle-track ${c.isVisible?'on':''}" id="ctog-${c.id}" onclick="toggleCompany('${c.id}',this)"></div>
          <span id="clbl-${c.id}" style="font-size:12.5px;font-weight:700;min-width:50px;color:${c.isVisible?'#10b981':'var(--text4)'}">${c.isVisible?'Shown':'Hidden'}</span>
        </div>
        <span class="material-symbols-rounded" style="font-size:20px;color:var(--text4);margin-left:8px">${isExp?'expand_less':'expand_more'}</span>
      </div>
      ${isExp ? `<div class="comp-body">
        <div style="font-size:12.5px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Individual Visibility</div>
        ${c.students.map((s, si) => {
          const initials = s.name.split(' ').map(w=>w[0]).join('').slice(0,2);
          return `<div class="pl-student-row">
            <div class="pl-av" style="background:${gradients[si%gradients.length]}">${initials}</div>
            <div style="flex:1;min-width:0">
              <div class="pl-name">${s.name}</div>
              <div class="pl-role">${c.role} · Placed ${s.placedDate} · ${s.salary}</div>
            </div>
            <span class="pl-score">${s.score}</span>
            <div class="pl-toggle-row" onclick="event.stopPropagation()">
              <div class="toggle-track ${s.isVisible?'on':''}" onclick="toggleStudent('${c.id}','${s.username}',this)"></div>
              <span id="slbl-${c.id}-${s.username}" class="pl-label" style="color:${s.isVisible?'#10b981':'var(--text4)'}">${s.isVisible?'Shown':'Hidden'}</span>
            </div>
            <a href="candidate-profile.html?u=${s.username}" style="display:flex;align-items:center;color:var(--brand);margin-left:8px"><span class="material-symbols-rounded" style="font-size:18px">open_in_new</span></a>
          </div>`;
        }).join('')}
      </div>` : ''}
    </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
