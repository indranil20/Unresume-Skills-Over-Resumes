<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Jobs — Unresume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="css/globals.css">
<link rel="stylesheet" href="css/navbar.css">
<style>
.jobs-page { min-height:100vh; padding:60px 24px 80px; position:relative; }
.jobs-inner { max-width:1160px; margin:0 auto; }
.jobs-title { font-family:var(--font-display); font-size:clamp(28px,5vw,52px); font-weight:800; color:var(--text1); letter-spacing:-.03em; margin-bottom:8px; }
.jobs-sub { font-size:15px; color:var(--text3); margin-bottom:32px; }
.jobs-toolbar { display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.search-box { flex:1; min-width:260px; display:flex; align-items:center; gap:10px; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:11px 16px; transition:border-color .15s; }
.search-box:focus-within { border-color:rgba(91,108,245,.4); }
.search-box input { flex:1; background:none; border:none; outline:none; font-size:14px; color:var(--text1); }
.search-box input::placeholder { color:var(--text4); }
.task-toggle { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; font-size:13px; font-weight:600; color:var(--text2); }
.task-toggle input { display:none; }
.pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
.jobs-count { font-size:13px; color:var(--text4); font-weight:600; margin-bottom:18px; }
.jobs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:18px; }
@media(max-width:560px){.jobs-grid{grid-template-columns:1fr}}
.job-card { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:24px; display:flex; flex-direction:column; gap:14px; text-decoration:none; position:relative; transition:border-color .2s,transform .2s,box-shadow .2s; }
.job-card:hover { border-color:var(--border-light); transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,.25); }
.job-card.featured { border-color:rgba(91,108,245,.3); }
.feat-badge { position:absolute; top:-1px; right:16px; display:inline-flex; align-items:center; gap:4px; padding:4px 10px; background:linear-gradient(135deg,#5b6cf5,#8040d8); border-radius:0 0 8px 8px; font-size:10px; font-weight:800; color:#fff; }
.job-top { display:flex; align-items:flex-start; gap:14px; }
.job-logo { width:44px; height:44px; border-radius:11px; background:var(--bg-elevated); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
.job-company { font-size:12px; color:var(--text4); font-weight:600; margin-bottom:3px; }
.job-title { font-size:15.5px; font-weight:700; color:var(--text1); line-height:1.3; }
.task-pill { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; background:rgba(0,196,255,.08); border:1px solid rgba(0,196,255,.2); border-radius:8px; font-size:12px; font-weight:600; color:var(--cyan); width:fit-content; }
.job-desc { font-size:13px; color:var(--text3); line-height:1.7; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.job-skills { display:flex; flex-wrap:wrap; gap:6px; }
.job-footer { display:flex; align-items:center; justify-content:space-between; padding-top:6px; border-top:1px solid var(--border); margin-top:auto; }
.job-cat { font-size:11.5px; color:var(--text4); font-weight:600; }
.job-apply { font-size:13px; font-weight:700; color:var(--brand); }
.jobs-empty { text-align:center; padding:80px 24px; color:var(--text3); display:flex; flex-direction:column; align-items:center; gap:12px; font-size:14px; }
</style>
</head>
<body>
<div id="navbar"></div>
<div class="page-wrap">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="jobs-page">
    <div class="jobs-inner">
      <h1 class="jobs-title">Job <span class="grad-text">Opportunities</span></h1>
      <p class="jobs-sub">Every listing includes a task. Complete it to apply — no resume required.</p>

      <div class="jobs-toolbar">
        <div class="search-box">
          <span class="material-symbols-rounded" style="font-size:18px;color:var(--text4)">search</span>
          <input type="text" id="searchInput" placeholder="Search by role, company, or skill…">
        </div>
        <label class="task-toggle">
          <input type="checkbox" id="taskOnly">
          <div class="toggle-track" id="taskToggleTrack"></div>
          Tasks only
        </label>
      </div>

      <div class="pills" id="catPills"></div>
      <div class="jobs-count" id="jobsCount"></div>
      <div class="jobs-grid" id="jobsGrid"></div>
    </div>
  </div>
</div>
<div id="footer"></div>

<script src="js/components.js"></script>
<script src="js/data.js"></script>
<script>
const jobs = getJobs();
let search = '', category = 'All', taskOnly = false;

function renderPills() {
  const cats = ['All', ...new Set(jobs.map(j => j.category))];
  document.getElementById('catPills').innerHTML = cats.map(c =>
    `<button class="cat-pill ${c===category?'active':''}" onclick="setCategory('${c}')">${c}</button>`
  ).join('');
}

function setCategory(c) { category = c; render(); }

function render() {
  const filtered = jobs.filter(j => {
    const q = search.toLowerCase();
    const ms = !q || j.title.toLowerCase().includes(q) || j.company.toLowerCase().includes(q) || j.skills.some(s=>s.toLowerCase().includes(q));
    const mc = category==='All' || j.category===category;
    const mt = !taskOnly || j.hasTask;
    return ms && mc && mt;
  });
  document.getElementById('jobsCount').textContent = `${filtered.length} listing${filtered.length!==1?'s':''}`;
  renderPills();
  if (!filtered.length) {
    document.getElementById('jobsGrid').innerHTML = `<div class="jobs-empty" style="grid-column:1/-1"><span class="material-symbols-rounded" style="font-size:40px;color:var(--text4)">search_off</span><p>No listings match your search.</p></div>`;
    return;
  }
  document.getElementById('jobsGrid').innerHTML = filtered.map(j => `
    <a href="job-detail.html?id=${j.id}" class="job-card ${j.featured?'featured':''}">
      ${j.featured?'<div class="feat-badge"><span class="material-symbols-rounded" style="font-size:11px">bolt</span> Featured</div>':''}
      <div class="job-top">
        <div class="job-logo">${j.logo}</div>
        <div><div class="job-company">${j.company}</div><div class="job-title">${j.title}</div></div>
      </div>
      ${j.hasTask?`<div class="task-pill"><span class="material-symbols-rounded" style="font-size:14px">task_alt</span> Includes a skill task</div>`:''}
      <p class="job-desc">${j.description}</p>
      <div class="job-skills">${j.skills.slice(0,4).map(s=>`<span class="skill-tag">${s}</span>`).join('')}${j.skills.length>4?`<span class="skill-tag">+${j.skills.length-4}</span>`:''}</div>
      <div class="job-footer"><span class="job-cat">${j.category}</span><span class="job-apply">View & Apply →</span></div>
    </a>`).join('');
}

document.getElementById('searchInput').addEventListener('input', e => { search = e.target.value; render(); });
document.getElementById('taskOnly').addEventListener('change', e => {
  taskOnly = e.target.checked;
  document.getElementById('taskToggleTrack').classList.toggle('on', taskOnly);
  render();
});

render();
</script>
</body>
</html>
